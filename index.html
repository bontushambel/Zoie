<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoie · Icon Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f7f5f0;
            color: #1e1e1e;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        .shop-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 2px solid #dcd8d0;
            padding-bottom: 1.2rem;
        }

        .shop-header h1 {
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #2d2a24, #4d463c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .shop-header h1 i {
            margin-right: 10px;
            color: #b8a48c;
            -webkit-text-fill-color: #b8a48c;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .lang-toggle {
            display: flex;
            background: #ece7df;
            border-radius: 40px;
            padding: 0.2rem;
            gap: 0.2rem;
        }

        .lang-toggle button {
            background: transparent;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            color: #5d5346;
            transition: 0.2s;
        }

        .lang-toggle button.active {
            background: #2d2a24;
            color: #f2ede6;
        }

        .lang-toggle button:hover:not(.active) {
            background: #ddd6cb;
        }

        .cart-badge {
            background: #2d2a24;
            color: #f2ede6;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.03);
            transition: 0.2s;
            cursor: pointer;
            position: relative;
        }

        .cart-badge i {
            font-size: 1.2rem;
            color: #d4c5b2;
        }

        .cart-badge span {
            background: #b8a48c;
            color: #1e1e1e;
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-left: 4px;
        }

        .cart-badge .cart-total {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-left: 2px;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.5rem;
            margin-bottom: 2.5rem;
            align-items: center;
        }

        .filter-bar .tag {
            background: #ece7df;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 450;
            color: #2b2823;
            border: 1px solid transparent;
            transition: 0.2s;
            cursor: default;
        }

        .filter-bar .tag i {
            margin-right: 6px;
            color: #8f7e6a;
        }

        .filter-bar .tag.active {
            background: #2d2a24;
            color: #f2ede6;
            border-color: #2d2a24;
        }

        .filter-bar .tag.active i {
            color: #d4c5b2;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem 1.8rem;
            margin-top: 0.5rem;
        }

        .icon-card {
            background: #fffffffa;
            border-radius: 28px;
            padding: 1.4rem 0.8rem 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: transform 0.15s ease, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid #efebe6;
            backdrop-filter: blur(2px);
        }

        .icon-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 30px -8px rgba(0, 0, 0, 0.08);
            border-color: #ddd6cb;
        }

        .icon-card .image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f3f0ea;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.9rem;
            border: 1px solid #e6dfd6;
            position: relative;
        }

        .icon-card .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: 0.2s;
        }

        .icon-card .image-wrapper img:hover {
            transform: scale(1.01);
        }

        .icon-card .image-wrapper .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e8e0d8, #d5cdc2);
            color: #7a6e5e;
            font-size: 0.7rem;
            text-align: center;
            padding: 0.5rem;
            word-break: break-all;
        }

        .icon-number {
            font-size: 0.7rem;
            color: #b5a18b;
            margin-bottom: 0.3rem;
        }

        .size-options {
            display: flex;
            gap: 0.5rem;
            margin: 0.4rem 0 0.6rem;
            width: 100%;
            justify-content: center;
        }

        .size-btn {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            border: 2px solid #dcd8d0;
            background: white;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            color: #5d5346;
            transition: 0.2s;
            flex: 1;
            max-width: 90px;
        }

        .size-btn:hover {
            border-color: #b8a48c;
            background: #f3f0ea;
        }

        .size-btn.active {
            border-color: #2d2a24;
            background: #2d2a24;
            color: white;
        }

        .size-btn .price-tag {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 0.1rem;
        }

        .btn-add {
            background: #1e1b17;
            border: none;
            color: white;
            font-weight: 500;
            padding: 0.6rem 0;
            width: 100%;
            border-radius: 60px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            cursor: pointer;
            margin-top: 0.2rem;
            border: 1px solid #2d2a24;
        }

        .btn-add i {
            font-size: 0.9rem;
            color: #cfc1b0;
        }

        .btn-add:hover {
            background: #3d3730;
            border-color: #4d463c;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.06);
        }

        .btn-add:active {
            transform: scale(0.95);
        }

        .btn-add.in-cart {
            background: #3a6b4b;
            border-color: #2b5a3a;
        }

        .btn-add:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .shop-footer {
            margin-top: 4rem;
            padding-top: 1.8rem;
            border-top: 1px solid #e2dbd2;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            color: #5d5346;
            font-size: 0.9rem;
        }

        .shop-footer i {
            margin: 0 4px;
            color: #b5a18b;
        }

        .hidden {
            display: none !important;
        }

        /* Cart Modal */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-modal-content {
            background: white;
            border-radius: 28px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
        }

        .cart-modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #5d5346;
            background: none;
            border: none;
        }

        .cart-modal-close:hover {
            color: #1e1b17;
        }

        .cart-modal h2 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: #2d2a24;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #efebe6;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 500;
        }

        .cart-item-size {
            font-size: 0.8rem;
            color: #7f7261;
        }

        .cart-item-price {
            font-weight: 600;
            margin-left: 1rem;
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: #c0392b;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.2rem 0.5rem;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            font-size: 1.2rem;
            font-weight: 600;
            border-top: 2px solid #dcd8d0;
            margin-top: 0.5rem;
        }

        .cart-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn-checkout {
            flex: 1;
            background: #2d2a24;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            min-width: 120px;
        }

        .btn-checkout:hover {
            background: #4d463c;
        }

        .btn-clear-cart {
            background: #ece7df;
            color: #5d5346;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-clear-cart:hover {
            background: #dcd8d0;
        }

        .empty-cart {
            text-align: center;
            color: #7f7261;
            padding: 2rem 0;
        }

        .empty-cart i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        @media (max-width: 600px) {
            body {
                padding: 1.2rem 0.8rem;
            }
            .shop-header h1 {
                font-size: 1.5rem;
            }
            .icon-grid {
                gap: 1.5rem;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .header-controls {
                gap: 0.5rem;
            }
            .lang-toggle button {
                padding: 0.3rem 0.7rem;
                font-size: 0.75rem;
            }
            .size-btn {
                font-size: 0.65rem;
                padding: 0.2rem 0.5rem;
                max-width: 70px;
            }
            .size-btn .price-tag {
                font-size: 0.6rem;
            }
            .cart-modal-content {
                padding: 1.5rem;
                max-height: 90vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <header class="shop-header">
            <h1><i class="fas fa-pen-fancy"></i> <span id="storeTitle">Zoie · Icon Store</span></h1>
            <div class="header-controls">
                <div class="lang-toggle">
                    <button id="langAmh" class="active">አማርኛ</button>
                    <button id="langEng">English</button>
                </div>
                <div class="cart-badge" id="cartBadge">
                    <i class="fas fa-shopping-bag"></i> <span id="cartLabel">cart</span>
                    <span id="cartCount">0</span>
                    <span class="cart-total" id="cartTotal"></span>
                </div>
            </div>
        </header>

        <div class="filter-bar">
            <span class="tag active"><i class="fas fa-th"></i> <span class="filter-all">ሁሉም</span></span>
            <span class="tag"><i class="far fa-star"></i> <span class="filter-featured">ተለይተው</span></span>
            <span class="tag"><i class="fas fa-tag"></i> <span class="filter-minimal">ዝቅተኛ</span></span>
            <span style="margin-left: auto; opacity: 0.6; font-size: 0.85rem;"><i class="fas fa-circle"></i> <span id="iconCount">16</span> <span id="iconsLabel">አዶዎች</span></span>
        </div>

        <div class="icon-grid" id="iconGrid"></div>

        <div class="shop-footer">
            <span><i class="far fa-copyright"></i> <span id="footerLeft">Zoie · ዲጂታል አዶዎች</span></span>
            <span><i class="fas fa-credit-card"></i> <span id="footerRight">መክፈያ</span></span>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-modal-content">
            <button class="cart-modal-close" id="cartModalClose">&times;</button>
            <h2 id="cartModalTitle">🛒 Your Cart</h2>
            <div id="cartItemsList"></div>
            <div class="cart-total">
                <span id="totalLabel">Total</span>
                <span id="cartTotalAmount">0 ብር</span>
            </div>
            <div class="cart-actions">
                <button class="btn-checkout" id="checkoutBtn">
                    <i class="fas fa-whatsapp"></i> <span id="checkoutText">Checkout</span>
                </button>
                <button class="btn-clear-cart" id="clearCartBtn">
                    <i class="fas fa-trash"></i> <span id="clearText">Clear</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============================================================
            // IMAGE FILENAMES
            // ============================================================
            const imageFilenames = [
                "-5848072967282167192_121.jpg",
                "-5931342307158330333_121.jpg",
                "-5974557035431315110_121.jpg",
                "-5976598046843800617_121.jpg",
                "-6005860303272790639_120.jpg",
                "IMG_20260719_011920_144.jpg",
                "IMG_20260719_011954_524.jpg",
                "IMG_20260719_011958_447.jpg",
                "IMG_20260719_012002_689.jpg",
                "IMG_20260719_012005_479.jpg",
                "IMG_20260719_012015_989.jpg",
                "IMG_20260719_012128_866.jpg",
                "IMG_20260719_012129_197.jpg",
                "IMG_20260719_012129_338.jpg",
                "IMG_20260719_012129_585.jpg",
                "IMG_20260719_012129_607.jpg"
            ];

            // ============================================================
            // PRICES
            // ============================================================
            const PRICES = {
                A5: 400,
                HALF: 200
            };

            const PHONE_NUMBER = '0940640089';

            // ============================================================
            // CART MANAGEMENT (localStorage)
            // ============================================================
            let cart = [];

            function loadCart() {
                try {
                    const saved = localStorage.getItem('zoie_cart');
                    if (saved) {
                        cart = JSON.parse(saved);
                    }
                } catch (e) {
                    cart = [];
                }
            }

            function saveCart() {
                localStorage.setItem('zoie_cart', JSON.stringify(cart));
            }

            function addToCart(imageIndex, size, price) {
                const existing = cart.find(item => item.imageIndex === imageIndex && item.size === size);
                if (existing) {
                    existing.quantity += 1;
                } else {
                    cart.push({
                        imageIndex: imageIndex,
                        filename: imageFilenames[imageIndex],
                        size: size,
                        price: price,
                        quantity: 1
                    });
                }
                saveCart();
                updateCartUI();
            }

            function removeFromCart(index) {
                cart.splice(index, 1);
                saveCart();
                updateCartUI();
                renderCartModal();
            }

            function clearCart() {
                cart = [];
                saveCart();
                updateCartUI();
                renderCartModal();
            }

            function getTotalItems() {
                return cart.reduce((sum, item) => sum + item.quantity, 0);
            }

            function getTotalPrice() {
                return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            }

            function isInCart(imageIndex, size) {
                return cart.some(item => item.imageIndex === imageIndex && item.size === size);
            }

            function getCartItem(imageIndex, size) {
                return cart.find(item => item.imageIndex === imageIndex && item.size === size);
            }

            // ============================================================
            // UI ELEMENTS
            // ============================================================
            const grid = document.getElementById('iconGrid');
            const cartSpan = document.getElementById('cartCount');
            const cartTotalSpan = document.getElementById('cartTotal');
            const cartModal = document.getElementById('cartModal');
            const cartItemsList = document.getElementById('cartItemsList');
            const cartTotalAmount = document.getElementById('cartTotalAmount');

            let currentLang = 'amh';
            let allCards = [];

            // ============================================================
            // BUILD THE GRID
            // ============================================================
            const baseUrl = 'https://raw.githubusercontent.com/bontushambel/Zoie/main/';

            imageFilenames.forEach((filename, index) => {
                const card = document.createElement('div');
                card.className = 'icon-card';
                card.dataset.index = index;

                // Image wrapper
                const wrapper = document.createElement('div');
                wrapper.className = 'image-wrapper';

                const img = document.createElement('img');
                img.src = baseUrl + filename;
                img.alt = 'Icon';
                img.loading = 'lazy';

                img.onerror = function() {
                    this.style.display = 'none';
                    const placeholder = document.createElement('div');
                    placeholder.className = 'placeholder';
                    placeholder.textContent = '📷 ' + filename.substring(0, 18) + '…';
                    this.parentNode.appendChild(placeholder);
                };

                wrapper.appendChild(img);
                card.appendChild(wrapper);

                // Icon number
                const numberEl = document.createElement('div');
                numberEl.className = 'icon-number';
                numberEl.textContent = `#${index + 1}`;
                card.appendChild(numberEl);

                // Size options
                const sizeContainer = document.createElement('div');
                sizeContainer.className = 'size-options';

                const a5Btn = document.createElement('button');
                a5Btn.className = 'size-btn active';
                a5Btn.dataset.size = 'A5';
                a5Btn.innerHTML = `A5 <span class="price-tag">${PRICES.A5} ብር</span>`;
                sizeContainer.appendChild(a5Btn);

                const halfBtn = document.createElement('button');
                halfBtn.className = 'size-btn';
                halfBtn.dataset.size = 'HALF';
                halfBtn.innerHTML = `½ A5 <span class="price-tag">${PRICES.HALF} ብር</span>`;
                sizeContainer.appendChild(halfBtn);

                card.appendChild(sizeContainer);

                // Price display
                const priceEl = document.createElement('div');
                priceEl.className = 'price';
                priceEl.innerHTML = `${PRICES.A5} <small>ብር</small>`;
                card.appendChild(priceEl);

                // Add button
                const btn = document.createElement('button');
                btn.className = 'btn-add';
                btn.innerHTML = `<i class="fas fa-plus-circle"></i> <span class="btn-text">ጨምር</span>`;
                btn.dataset.size = 'A5';
                btn.dataset.price = PRICES.A5;

                let selectedSize = 'A5';

                function selectSize(size) {
                    selectedSize = size;
                    const price = size === 'A5' ? PRICES.A5 : PRICES.HALF;
                    priceEl.innerHTML = `${price} <small>ብር</small>`;
                    btn.dataset.size = size;
                    btn.dataset.price = price;

                    a5Btn.classList.toggle('active', size === 'A5');
                    halfBtn.classList.toggle('active', size === 'HALF');

                    updateButtonState(index, size);
                }

                function updateButtonState(imgIndex, size) {
                    const inCart = isInCart(imgIndex, size);
                    if (inCart) {
                        btn.classList.add('in-cart');
                        const btnText = btn.querySelector('.btn-text');
                        btnText.textContent = currentLang === 'amh' ? 'ተጨምሯል' : 'in cart';
                        btn.innerHTML = `<i class="fas fa-check"></i> <span class="btn-text">${currentLang === 'amh' ? 'ተጨምሯል' : 'in cart'}</span>`;
                    } else {
                        btn.classList.remove('in-cart');
                        const btnText = btn.querySelector('.btn-text');
                        btnText.textContent = currentLang === 'amh' ? 'ጨምር' : 'Add';
                        btn.innerHTML = `<i class="fas fa-plus-circle"></i> <span class="btn-text">${currentLang === 'amh' ? 'ጨምር' : 'Add'}</span>`;
                    }
                }

                a5Btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    selectSize('A5');
                });

                halfBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    selectSize('HALF');
                });

                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const price = parseInt(this.dataset.price);
                    const size = this.dataset.size;

                    if (isInCart(index, size)) {
                        // Remove from cart
                        const itemIndex = cart.findIndex(item => item.imageIndex === index && item.size === size);
                        if (itemIndex !== -1) {
                            cart.splice(itemIndex, 1);
                            saveCart();
                            updateCartUI();
                            updateButtonState(index, size);
                        }
                        return;
                    }

                    addToCart(index, size, price);
                    updateButtonState(index, size);
                    updateCartUI();

                    // Feedback
                    const orig = this.innerHTML;
                    this.innerHTML = `<i class="fas fa-check"></i> <span class="btn-text">${currentLang === 'amh' ? 'ተጨመረ' : 'added'}</span>`;
                    this.style.background = '#3a6b4b';
                    this.style.borderColor = '#2b5a3a';
                    setTimeout(() => {
                        this.innerHTML = orig;
                        this.style.background = '#1e1b17';
                        this.style.borderColor = '#2d2a24';
                    }, 800);
                });

                card.appendChild(btn);
                grid.appendChild(card);

                allCards.push({
                    card: card,
                    btn: btn,
                    a5Btn: a5Btn,
                    halfBtn: halfBtn,
                    priceEl: priceEl,
                    selectedSize: 'A5',
                    index: index
                });

                // Check initial cart state
                updateButtonState(index, 'A5');
            });

            // ============================================================
            // UPDATE CART UI
            // ============================================================
            function updateCartUI() {
                const totalItems = getTotalItems();
                const totalPrice = getTotalPrice();

                if (cartSpan) cartSpan.textContent = totalItems;
                if (cartTotalSpan) {
                    cartTotalSpan.textContent = totalItems > 0 ? `(${totalPrice} ብር)` : '';
                }

                // Update all card buttons
                allCards.forEach(cardData => {
                    const size = cardData.selectedSize || 'A5';
                    const inCart = isInCart(cardData.index, size);
                    const btn = cardData.btn;
                    if (inCart) {
                        btn.classList.add('in-cart');
                        btn.innerHTML = `<i class="fas fa-check"></i> <span class="btn-text">${currentLang === 'amh' ? 'ተጨምሯል' : 'in cart'}</span>`;
                    } else {
                        btn.classList.remove('in-cart');
                        btn.innerHTML = `<i class="fas fa-plus-circle"></i> <span class="btn-text">${currentLang === 'amh' ? 'ጨምር' : 'Add'}</span>`;
                    }
                });
            }

            // ============================================================
            // CART MODAL
            // ============================================================
            function renderCartModal() {
                if (cart.length === 0) {
                    cartItemsList.innerHTML = `
                        <div class="empty-cart">
                            <i class="fas fa-shopping-bag"></i>
                            <p>${currentLang === 'amh' ? 'ጋሪዎ ባዶ ነው' : 'Your cart is empty'}</p>
                        </div>
                    `;
                    cartTotalAmount.textContent = '0 ብር';
                    return;
                }

                let html = '';
                cart.forEach((item, idx) => {
                    const sizeLabel = item.size === 'A5' ? 'A5' : '½ A5';
                    html += `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <div class="cart-item-name">Icon #${item.imageIndex + 1}</div>
                                <div class="cart-item-size">${sizeLabel} × ${item.quantity}</div>
                            </div>
                            <div class="cart-item-price">${item.price * item.quantity} ብር</div>
                            <button class="cart-item-remove" data-index="${idx}">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    `;
                });

                cartItemsList.innerHTML = html;

                // Remove buttons
                document.querySelectorAll('.cart-item-remove').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        removeFromCart(idx);
                        // Update all card buttons
                        allCards.forEach(cardData => {
                            const size = cardData.selectedSize || 'A5';
                            updateButtonStateForCard(cardData, size);
                        });
                    });
                });

                const total = getTotalPrice();
                cartTotalAmount.textContent = `${total} ብር`;
            }

            function updateButtonStateForCard(cardData, size) {
                const inCart = isInCart(cardData.index, size);
                const btn = cardData.btn;
                if (inCart) {
                    btn.classList.add('in-cart');
                    btn.innerHTML = `<i class="fas fa-check"></i> <span class="btn-text">${currentLang === 'amh' ? 'ተጨምሯል' : 'in cart'}</span>`;
                } else {
                    btn.classList.remove('in-cart');
                    btn.innerHTML = `<i class="fas fa-plus-circle"></i> <span class="btn-text">${currentLang === 'amh' ? 'ጨምር' : 'Add'}</span>`;
                }
            }

            // ============================================================
            // CHECKOUT - WhatsApp
            // ============================================================
            function checkout() {
                if (cart.length === 0) {
                    alert(currentLang === 'amh' ? 'ጋሪዎ ባዶ ነው!' : 'Your cart is empty!');
                    return;
                }

                let message = '🛒 *Zoie Icon Store Order*%0A%0A';
                let total = 0;

                cart.forEach((item, idx) => {
                    const sizeLabel = item.size === 'A5' ? 'A5' : '½ A5';
                    const subtotal = item.price * item.quantity;
                    total += subtotal;
                    message += `${idx + 1}. Icon #${item.imageIndex + 1} (${sizeLabel}) × ${item.quantity} = ${subtotal} ብር%0A`;
                });

                message += `%0A────────────────%0A`;
                message += `*Total: ${total} ብር*%0A%0A`;
                message += `Thank you for your order! 🙏`;

                const url = `https://wa.me/${PHONE_NUMBER}?text=${message}`;
                window.open(url, '_blank');

                // Clear cart after checkout
                clearCart();
                cartModal.classList.remove('active');
            }

            // ============================================================
            // LANGUAGE TOGGLE
            // ============================================================
            const langAmhBtn = document.getElementById('langAmh');
            const langEngBtn = document.getElementById('langEng');
            const storeTitle = document.getElementById('storeTitle');
            const filterAll = document.querySelector('.filter-all');
            const filterFeatured = document.querySelector('.filter-featured');
            const filterMinimal = document.querySelector('.filter-minimal');
            const iconsLabel = document.getElementById('iconsLabel');
            const footerLeft = document.getElementById('footerLeft');
            const footerRight = document.getElementById('footerRight');
            const cartLabel = document.getElementById('cartLabel');
            const cartModalTitle = document.getElementById('cartModalTitle');
            const totalLabel = document.getElementById('totalLabel');
            const checkoutText = document.getElementById('checkoutText');
            const clearText = document.getElementById('clearText');

            const translations = {
                amh: {
                    title: 'Zoie · አዶዎች',
                    filterAll: 'ሁሉም',
                    filterFeatured: 'ተለይተው',
                    filterMinimal: 'ዝቅተኛ',
                    iconsLabel: 'አዶዎች',
                    cart: 'ጋሪ',
                    btnText: 'ጨምር',
                    btnAdded: 'ተጨመረ',
                    btnInCart: 'ተጨምሯል',
                    footerLeft: 'Zoie · ዲጂታል አዶዎች',
                    footerRight: 'መክፈያ',
                    cartModalTitle: '🛒 ጋሪዎ',
                    totalLabel: 'ጠቅላላ',
                    checkoutText: 'መግዛት',
                    clearText: 'አጽዳ',
                    emptyCart: 'ጋሪዎ ባዶ ነው'
                },
                eng: {
                    title: 'Zoie · Icons',
                    filterAll: 'All',
                    filterFeatured: 'Featured',
                    filterMinimal: 'Minimal',
                    iconsLabel: 'Icons',
                    cart: 'Cart',
                    btnText: 'Add',
                    btnAdded: 'Added',
                    btnInCart: 'in cart',
                    footerLeft: 'Zoie · Digital Icons',
                    footerRight: 'Checkout',
                    cartModalTitle: '🛒 Your Cart',
                    totalLabel: 'Total',
                    checkoutText: 'Checkout',
                    clearText: 'Clear',
                    emptyCart: 'Your cart is empty'
                }
            };

            function setLanguage(lang) {
                currentLang = lang;
                const t = translations[lang];

                storeTitle.textContent = t.title;
                filterAll.textContent = t.filterAll;
                filterFeatured.textContent = t.filterFeatured;
                filterMinimal.textContent = t.filterMinimal;
                iconsLabel.textContent = t.iconsLabel;
                cartLabel.textContent = t.cart;
                footerLeft.textContent = t.footerLeft;
                footerRight.textContent = t.footerRight;
                cartModalTitle.textContent = t.cartModalTitle;
                totalLabel.textContent = t.totalLabel;
                checkoutText.textContent = t.checkoutText;
                clearText.textContent = t.clearText;

                allCards.forEach(item => {
                    const btnText = item.btn.querySelector('.btn-text');
                    const size = item.selectedSize || 'A5';
                    const inCart = isInCart(item.index, size);
                    if (btnText) {
                        if (inCart) {
                            btnText.textContent = t.btnInCart;
                        } else {
                            btnText.textContent = t.btnText;
                        }
                    }
                    // Update button HTML
                    const btn = item.btn;
                    if (inCart) {
                        btn.innerHTML =
                            `<i class="fas fa-check"></i> <span class="btn-text">${t.btnInCart}</span>`;
                    } else {
                        btn.innerHTML =
                            `<i class="fas fa-plus-circle"></i> <span class="btn-text">${t.btnText}</span>`;
                    }
                });

                updateCartUI();
                renderCartModal();

                langAmhBtn.classList.toggle('active', lang === 'amh');
                langEngBtn.classList.toggle('active', lang === 'eng');
            }

            langAmhBtn.addEventListener('click', () => setLanguage('amh'));
            langEngBtn.addEventListener('click', () => setLanguage('eng'));

            // ============================================================
            // CART MODAL EVENTS
            // ============================================================
            document.getElementById('cartBadge').addEventListener('click', function() {
                renderCartModal();
                cartModal.classList.add('active');
            });

            document.getElementById('cartModalClose').addEventListener('click', function() {
                cartModal.classList.remove('active');
            });

            cartModal.addEventListener('click', function(e) {
                if (e.target === this) {
                    cartModal.classList.remove('active');
                }
            });

            document.getElementById('clearCartBtn').addEventListener('click', function() {
                if (cart.length === 0) return;
                if (confirm(currentLang === 'amh' ? 'ሁሉንም ከጋሪ ማስወገድ ይፈልጋሉ?' : 'Clear all items from cart?')) {
                    clearCart();
                    renderCartModal();
                }
            });

            document.getElementById('checkoutBtn').addEventListener('click', checkout);

            // ============================================================
            // KEYBOARD SHORTCUT - ESC to close modal
            // ============================================================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && cartModal.classList.contains('active')) {
                    cartModal.classList.remove('active');
                }
            });

            // ============================================================
            // INITIALIZE
            // ============================================================
            loadCart();
            setLanguage('amh');
            document.getElementById('iconCount').textContent = imageFilenames.length;
            updateCartUI();

            console.log(`✅ Zoie store ready · ${imageFilenames.length} icons loaded`);
            console.log(`📐 Sizes: A5 (${PRICES.A5} ETB) and Half A5 (${PRICES.HALF} ETB)`);
            console.log(`📱 Checkout via WhatsApp: ${PHONE_NUMBER}`);
            console.log(`💾 Cart saved in localStorage`);
        })();
    </script>
</body>
</html>
