<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ቅዱሳን አዶዎች · Zoie Icon Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f7f5f0;
            color: #1e1e1e;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        .shop-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 2px solid #dcd8d0;
            padding-bottom: 1.2rem;
        }

        .shop-header h1 {
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #2d2a24, #4d463c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .shop-header h1 i {
            margin-right: 10px;
            color: #b8a48c;
            -webkit-text-fill-color: #b8a48c;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .lang-toggle {
            display: flex;
            background: #ece7df;
            border-radius: 40px;
            padding: 0.2rem;
            gap: 0.2rem;
        }

        .lang-toggle button {
            background: transparent;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            color: #5d5346;
            transition: 0.2s;
        }

        .lang-toggle button.active {
            background: #2d2a24;
            color: #f2ede6;
        }

        .lang-toggle button:hover:not(.active) {
            background: #ddd6cb;
        }

        .cart-badge {
            background: #2d2a24;
            color: #f2ede6;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.03);
            transition: 0.2s;
            cursor: pointer;
        }

        .cart-badge i {
            font-size: 1.2rem;
            color: #d4c5b2;
        }

        .cart-badge span {
            background: #b8a48c;
            color: #1e1e1e;
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-left: 4px;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.5rem;
            margin-bottom: 2.5rem;
            align-items: center;
        }

        .filter-bar .tag {
            background: #ece7df;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 450;
            color: #2b2823;
            border: 1px solid transparent;
            transition: 0.2s;
            cursor: default;
        }

        .filter-bar .tag i {
            margin-right: 6px;
            color: #8f7e6a;
        }

        .filter-bar .tag.active {
            background: #2d2a24;
            color: #f2ede6;
            border-color: #2d2a24;
        }

        .filter-bar .tag.active i {
            color: #d4c5b2;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem 1.8rem;
            margin-top: 0.5rem;
        }

        .icon-card {
            background: #fffffffa;
            border-radius: 28px;
            padding: 1.4rem 0.8rem 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: transform 0.15s ease, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid #efebe6;
            backdrop-filter: blur(2px);
        }

        .icon-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 30px -8px rgba(0, 0, 0, 0.08);
            border-color: #ddd6cb;
        }

        .icon-card .image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f3f0ea;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.9rem;
            border: 1px solid #e6dfd6;
            position: relative;
        }

        .icon-card .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: 0.2s;
        }

        .icon-card .image-wrapper img:hover {
            transform: scale(1.01);
        }

        .icon-card .image-wrapper .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e8e0d8, #d5cdc2);
            color: #7a6e5e;
            font-size: 0.7rem;
            text-align: center;
            padding: 0.5rem;
            word-break: break-all;
        }

        .icon-card .icon-title {
            font-weight: 550;
            font-size: 1rem;
            letter-spacing: -0.01em;
            color: #27241f;
            margin-bottom: 0.1rem;
            line-height: 1.3;
        }

        .icon-card .icon-title-amh {
            font-size: 0.9rem;
            color: #5d5346;
            margin-bottom: 0.2rem;
            font-weight: 400;
        }

        .icon-card .icon-sub {
            font-size: 0.75rem;
            color: #7f7261;
            letter-spacing: 0.02em;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            font-weight: 400;
        }

        .icon-card .price {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1f1b16;
            margin: 0.4rem 0 0.6rem;
        }

        .icon-card .price small {
            font-weight: 400;
            font-size: 0.7rem;
            color: #887b6a;
            margin-left: 4px;
        }

        .btn-add {
            background: #1e1b17;
            border: none;
            color: white;
            font-weight: 500;
            padding: 0.6rem 0;
            width: 80%;
            border-radius: 60px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            cursor: pointer;
            margin-top: 0.2rem;
            border: 1px solid #2d2a24;
        }

        .btn-add i {
            font-size: 0.9rem;
            color: #cfc1b0;
        }

        .btn-add:hover {
            background: #3d3730;
            border-color: #4d463c;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.06);
        }

        .btn-add:active {
            transform: scale(0.95);
        }

        .shop-footer {
            margin-top: 4rem;
            padding-top: 1.8rem;
            border-top: 1px solid #e2dbd2;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            color: #5d5346;
            font-size: 0.9rem;
        }

        .shop-footer i {
            margin: 0 4px;
            color: #b5a18b;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            body {
                padding: 1.2rem 0.8rem;
            }
            .shop-header h1 {
                font-size: 1.5rem;
            }
            .icon-grid {
                gap: 1.5rem;
            }
            .header-controls {
                gap: 0.5rem;
            }
            .lang-toggle button {
                padding: 0.3rem 0.7rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <header class="shop-header">
            <h1><i class="fas fa-pen-fancy"></i> <span id="storeTitle">Zoie · Icon Store</span></h1>
            <div class="header-controls">
                <div class="lang-toggle">
                    <button id="langAmh" class="active">አማርኛ</button>
                    <button id="langEng">English</button>
                </div>
                <div class="cart-badge" id="cartBadge">
                    <i class="fas fa-shopping-bag"></i> <span id="cartLabel">cart</span>
                    <span id="cartCount">0</span>
                </div>
            </div>
        </header>

        <div class="filter-bar">
            <span class="tag active"><i class="fas fa-th"></i> <span class="filter-all">ሁሉም</span></span>
            <span class="tag"><i class="far fa-star"></i> <span class="filter-featured">ተለይተው</span></span>
            <span class="tag"><i class="fas fa-tag"></i> <span class="filter-minimal">ዝቅተኛ</span></span>
            <span style="margin-left: auto; opacity: 0.6; font-size: 0.85rem;"><i class="fas fa-circle"></i> <span id="iconCount">16</span> <span id="iconsLabel">አዶዎች</span></span>
        </div>

        <div class="icon-grid" id="iconGrid"></div>

        <div class="shop-footer">
            <span><i class="far fa-copyright"></i> <span id="footerLeft">Zoie · ዲጂታል አዶዎች</span></span>
            <span><i class="fas fa-credit-card"></i> <span id="footerRight">መክፈያ</span></span>
        </div>
    </div>

    <script>
        (function() {
            // ============================================================
            // SAINT NAMES (Amharic & English) for each icon
            // ============================================================
            const saintData = [{
                id: 0,
                nameAmh: "ቅዱስ ጊዮርጊስ",
                nameEng: "Saint George"
            }, {
                id: 1,
                nameAmh: "ቅድስት ማሪያም",
                nameEng: "Saint Mary"
            }, {
                id: 2,
                nameAmh: "ቅዱስ ሚካኤል",
                nameEng: "Saint Michael"
            }, {
                id: 3,
                nameAmh: "ቅዱስ ገብርኤል",
                nameEng: "Saint Gabriel"
            }, {
                id: 4,
                nameAmh: "ቅዱስ ጴጥሮስ",
                nameEng: "Saint Peter"
            }, {
                id: 5,
                nameAmh: "ቅዱስ ጳውሎስ",
                nameEng: "Saint Paul"
            }, {
                id: 6,
                nameAmh: "ቅዱስ ዮሐንስ",
                nameEng: "Saint John"
            }, {
                id: 7,
                nameAmh: "ቅዱስ ላዛሮስ",
                nameEng: "Saint Lazarus"
            }, {
                id: 8,
                nameAmh: "ቅድስት ሄለና",
                nameEng: "Saint Helena"
            }, {
                id: 9,
                nameAmh: "ቅዱስ አንቶኒዮስ",
                nameEng: "Saint Anthony"
            }, {
                id: 10,
                nameAmh: "ቅዱስ ተክለ ሃይማኖት",
                nameEng: "Saint Tekle Haymanot"
            }, {
                id: 11,
                nameAmh: "ቅዱስ አባ ጊዮርጊስ",
                nameEng: "Abba George"
            }, {
                id: 12,
                nameAmh: "ቅድስት ሥላሴ",
                nameEng: "Holy Trinity"
            }, {
                id: 13,
                nameAmh: "ቅዱስ ኪሪሎስ",
                nameEng: "Saint Cyril"
            }, {
                id: 14,
                nameAmh: "ቅዱስ አርሴማ",
                nameEng: "Saint Arsema"
            }, {
                id: 15,
                nameAmh: "ቅዱስ ዮሴፍ",
                nameEng: "Saint Joseph"
            }];

            // ============================================================
            // IMAGE FILENAMES (must match your repository)
            // ============================================================
            const imageFilenames = [
                "-5848072967282167192_121.jpg",
                "-5931342307158330333_121.jpg",
                "-5974557035431315110_121.jpg",
                "-5976598046843800617_121.jpg",
                "-6005860303272790639_120.jpg",
                "IMG_20260719_011920_144.jpg",
                "IMG_20260719_011954_524.jpg",
                "IMG_20260719_011958_447.jpg",
                "IMG_20260719_012002_689.jpg",
                "IMG_20260719_012005_479.jpg",
                "IMG_20260719_012015_989.jpg",
                "IMG_20260719_012128_866.jpg",
                "IMG_20260719_012129_197.jpg",
                "IMG_20260719_012129_338.jpg",
                "IMG_20260719_012129_585.jpg",
                "IMG_20260719_012129_607.jpg"
            ];

            // ============================================================
            // PRICES in Ethiopian Birr (ETB)
            // ============================================================
            function getPrice(index) {
                const prices = [450, 380, 520, 490, 350, 420, 560, 390, 470, 510, 580, 440, 530, 460, 500, 550];
                return prices[index % prices.length];
            }

            // ============================================================
            // BUILD THE GRID
            // ============================================================
            const grid = document.getElementById('iconGrid');
            if (!grid) return;

            let cartItems = 0;
            const cartSpan = document.getElementById('cartCount');
            const cartLabel = document.getElementById('cartLabel');

            let currentLang = 'amh'; // 'amh' or 'eng'

            function updateCart() {
                if (cartSpan) cartSpan.textContent = cartItems;
                if (cartLabel) {
                    cartLabel.textContent = currentLang === 'amh' ? 'ጋሪ' : 'cart';
                }
            }

            // Store all card elements for language switching
            let allCards = [];

            // Base URL for images
            const baseUrl = 'https://raw.githubusercontent.com/bontushambel/Zoie/main/';

            imageFilenames.forEach((filename, index) => {
                const saint = saintData[index % saintData.length];
                const priceETB = getPrice(index);

                const card = document.createElement('div');
                card.className = 'icon-card';
                card.dataset.index = index;

                // Image wrapper
                const wrapper = document.createElement('div');
                wrapper.className = 'image-wrapper';

                const img = document.createElement('img');
                img.src = baseUrl + filename;
                img.alt = saint.nameEng;
                img.loading = 'lazy';

                img.onerror = function() {
                    this.style.display = 'none';
                    const placeholder = document.createElement('div');
                    placeholder.className = 'placeholder';
                    placeholder.textContent = '📷 ' + filename.substring(0, 18) + '…';
                    this.parentNode.appendChild(placeholder);
                };

                wrapper.appendChild(img);
                card.appendChild(wrapper);

                // Title - Amharic
                const titleAmh = document.createElement('div');
                titleAmh.className = 'icon-title-amh';
                titleAmh.textContent = saint.nameAmh;
                card.appendChild(titleAmh);

                // Title - English (hidden by default)
                const titleEng = document.createElement('div');
                titleEng.className = 'icon-title hidden';
                titleEng.textContent = saint.nameEng;
                card.appendChild(titleEng);

                // Subtitle
                const subEl = document.createElement('div');
                subEl.className = 'icon-sub';
                const styles = ['ባሕላዊ', 'ጥንታዊ', 'ኦርቶዶክስ', 'ዘመናዊ', 'ክላሲክ', 'ንጹህ'];
                const styleIdx = index % styles.length;
                subEl.textContent = styles[styleIdx] + ' · ' + (index % 3 === 0 ? 'ልዩ' : 'መደበኛ');
                card.appendChild(subEl);

                // Price in ETB
                const priceEl = document.createElement('div');
                priceEl.className = 'price';
                priceEl.innerHTML = `${priceETB} <small>ብር</small>`;
                card.appendChild(priceEl);

                // Add button
                const btn = document.createElement('button');
                btn.className = 'btn-add';
                btn.innerHTML = `<i class="fas fa-plus-circle"></i> <span class="btn-text">ጨምር</span>`;
                btn.dataset.saintAmh = saint.nameAmh;
                btn.dataset.saintEng = saint.nameEng;
                btn.dataset.price = priceETB;

                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    cartItems += 1;
                    updateCart();
                    const orig = this.innerHTML;
                    this.innerHTML = `<i class="fas fa-check"></i> <span class="btn-text">${currentLang === 'amh' ? 'ተጨመረ' : 'added'}</span>`;
                    this.style.background = '#3a6b4b';
                    this.style.borderColor = '#2b5a3a';
                    setTimeout(() => {
                        this.innerHTML = orig;
                        this.style.background = '#1e1b17';
                        this.style.borderColor = '#2d2a24';
                    }, 1200);
                    console.log(`➕ Added: ${currentLang === 'amh' ? saint.nameAmh : saint.nameEng} (${priceETB} ETB)`);
                });

                card.appendChild(btn);
                grid.appendChild(card);

                // Store reference for language switching
                allCards.push({
                    card: card,
                    titleAmh: titleAmh,
                    titleEng: titleEng,
                    saintAmh: saint.nameAmh,
                    saintEng: saint.nameEng,
                    price: priceETB,
                    btn: btn
                });
            });

            // ============================================================
            // LANGUAGE TOGGLE
            // ============================================================
            const langAmhBtn = document.getElementById('langAmh');
            const langEngBtn = document.getElementById('langEng');
            const storeTitle = document.getElementById('storeTitle');
            const filterAll = document.querySelector('.filter-all');
            const filterFeatured = document.querySelector('.filter-featured');
            const filterMinimal = document.querySelector('.filter-minimal');
            const iconsLabel = document.getElementById('iconsLabel');
            const footerLeft = document.getElementById('footerLeft');
            const footerRight = document.getElementById('footerRight');

            const translations = {
                amh: {
                    title: 'Zoie · ቅዱሳን አዶዎች',
                    filterAll: 'ሁሉም',
                    filterFeatured: 'ተለይተው',
                    filterMinimal: 'ዝቅተኛ',
                    iconsLabel: 'አዶዎች',
                    cart: 'ጋሪ',
                    btnText: 'ጨምር',
                    btnAdded: 'ተጨመረ',
                    footerLeft: 'Zoie · ዲጂታል አዶዎች',
                    footerRight: 'መክፈያ'
                },
                eng: {
                    title: 'Zoie · Icon Store',
                    filterAll: 'All',
                    filterFeatured: 'Featured',
                    filterMinimal: 'Minimal',
                    iconsLabel: 'Icons',
                    cart: 'Cart',
                    btnText: 'Add',
                    btnAdded: 'Added',
                    footerLeft: 'Zoie · Digital Icons',
                    footerRight: 'Checkout'
                }
            };

            function setLanguage(lang) {
                currentLang = lang;
                const t = translations[lang];

                // Header
                storeTitle.textContent = t.title;

                // Filters
                filterAll.textContent = t.filterAll;
                filterFeatured.textContent = t.filterFeatured;
                filterMinimal.textContent = t.filterMinimal;
                iconsLabel.textContent = t.iconsLabel;

                // Cart
                cartLabel.textContent = t.cart;
                updateCart();

                // Footer
                footerLeft.textContent = t.footerLeft;
                footerRight.textContent = t.footerRight;

                // Cards
                allCards.forEach(item => {
                    if (lang === 'amh') {
                        item.titleAmh.classList.remove('hidden');
                        item.titleEng.classList.add('hidden');
                    } else {
                        item.titleAmh.classList.add('hidden');
                        item.titleEng.classList.remove('hidden');
                    }
                    // Update button text
                    const btnText = item.btn.querySelector('.btn-text');
                    if (btnText) {
                        btnText.textContent = t.btnText;
                    }
                });

                // Toggle button styles
                langAmhBtn.classList.toggle('active', lang === 'amh');
                langEngBtn.classList.toggle('active', lang === 'eng');
            }

            langAmhBtn.addEventListener('click', () => setLanguage('amh'));
            langEngBtn.addEventListener('click', () => setLanguage('eng'));

            // ============================================================
            // CART BADGE CLICK
            // ============================================================
            const badge = document.getElementById('cartBadge');
            if (badge) {
                badge.addEventListener('click', function() {
                    if (cartItems === 0) {
                        alert(currentLang === 'amh' ? '🛒 ጋሪዎ ባዶ ነው። አዶዎችን ይጨምሩ!' : '🛒 Your cart is empty. Add some icons!');
                    } else {
                        alert(currentLang === 'amh' ?
                            `🛒 በጋሪዎ ውስጥ ${cartItems} አዶ ${cartItems > 1 ? 'ዎች' : ''} አሉ።` :
                            `🛒 You have ${cartItems} item${cartItems > 1 ? 's' : ''} in your cart.`);
                    }
                });
            }

            // ============================================================
            // INITIALIZE
            // ============================================================
            // Set initial language to Amharic
            setLanguage('amh');

            // Update icon count
            document.getElementById('iconCount').textContent = imageFilenames.length;

            console.log(`✅ Zoie store ready · ${imageFilenames.length} icons loaded from ${baseUrl}`);
            console.log('🔄 Language toggle available: Amharic / English');
        })();
    </script>
</body>
</html>
