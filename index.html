<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoie Gifts Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ============================================================
           CSS VARIABLES - Light Mode (default)
           ============================================================ */
        :root {
            --bg-primary: #f7f5f0;
            --bg-secondary: #fffffffa;
            --bg-card: #fffffffa;
            --bg-hover: #f3f0ea;
            --text-primary: #1e1e1e;
            --text-secondary: #5d5346;
            --text-muted: #7f7261;
            --border-color: #dcd8d0;
            --border-light: #efebe6;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.02);
            --shadow-hover: 0 18px 30px -8px rgba(0, 0, 0, 0.08);
            --btn-primary: #1e1b17;
            --btn-primary-hover: #3d3730;
            --btn-primary-text: white;
            --btn-in-cart: #3a6b4b;
            --btn-in-cart-border: #2b5a3a;
            --lang-bg: #ece7df;
            --lang-text: #5d5346;
            --lang-active: #2d2a24;
            --lang-active-text: #f2ede6;
            --cart-bg: #2d2a24;
            --cart-text: #f2ede6;
            --cart-count-bg: #b8a48c;
            --cart-count-text: #1e1e1e;
            --footer-border: #e2dbd2;
            --modal-bg: white;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --price-color: #1f1b16;
            --placeholder-bg: #f3f0ea;
            --placeholder-border: #e6dfd6;
            --image-bg: #f3f0ea;
            --size-btn-bg: white;
            --size-btn-border: #dcd8d0;
            --size-btn-text: #5d5346;
            --size-btn-active-bg: #2d2a24;
            --size-btn-active-text: white;
            --filter-tag-bg: #ece7df;
            --filter-tag-text: #2b2823;
            --filter-tag-active-bg: #2d2a24;
            --filter-tag-active-text: #f2ede6;
            --clear-btn-bg: #ece7df;
            --clear-btn-text: #5d5346;
            --clear-btn-hover: #dcd8d0;
            --icon-number: #b5a18b;
        }

        /* ============================================================
           DARK MODE
           ============================================================ */
        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-card: #2d2d2d;
            --bg-hover: #3a3a3a;
            --text-primary: #e8e8e8;
            --text-secondary: #b5b5b5;
            --text-muted: #999999;
            --border-color: #444444;
            --border-light: #3a3a3a;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 2px 6px rgba(0, 0, 0, 0.2);
            --shadow-hover: 0 18px 30px -8px rgba(0, 0, 0, 0.4);
            --btn-primary: #3d3d3d;
            --btn-primary-hover: #555555;
            --btn-primary-text: #e8e8e8;
            --btn-in-cart: #2a5a3a;
            --btn-in-cart-border: #1a4a2a;
            --lang-bg: #3a3a3a;
            --lang-text: #b5b5b5;
            --lang-active: #555555;
            --lang-active-text: #e8e8e8;
            --cart-bg: #3d3d3d;
            --cart-text: #e8e8e8;
            --cart-count-bg: #666666;
            --cart-count-text: #e8e8e8;
            --footer-border: #444444;
            --modal-bg: #2d2d2d;
            --modal-overlay: rgba(0, 0, 0, 0.7);
            --price-color: #e8e8e8;
            --placeholder-bg: #3a3a3a;
            --placeholder-border: #444444;
            --image-bg: #3a3a3a;
            --size-btn-bg: #3a3a3a;
            --size-btn-border: #555555;
            --size-btn-text: #b5b5b5;
            --size-btn-active-bg: #555555;
            --size-btn-active-text: #e8e8e8;
            --filter-tag-bg: #3a3a3a;
            --filter-tag-text: #b5b5b5;
            --filter-tag-active-bg: #555555;
            --filter-tag-active-text: #e8e8e8;
            --clear-btn-bg: #3a3a3a;
            --clear-btn-text: #b5b5b5;
            --clear-btn-hover: #4a4a4a;
            --icon-number: #777777;
        }

        /* ============================================================
           BASE STYLES
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 2rem 1.5rem;
            padding-bottom: 6rem;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .shop-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1.2rem;
            transition: border-color 0.3s ease;
        }

        .shop-header h1 {
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #2d2a24, #4d463c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .shop-header h1 i {
            margin-right: 10px;
            color: #b8a48c;
            -webkit-text-fill-color: #b8a48c;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            background: var(--lang-bg);
            border: none;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--lang-text);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .theme-toggle:hover {
            background: var(--border-color);
        }

        .theme-toggle .theme-icon {
            font-size: 1.1rem;
        }

        .lang-toggle {
            display: flex;
            background: var(--lang-bg);
            border-radius: 40px;
            padding: 0.2rem;
            gap: 0.2rem;
        }

        .lang-toggle button {
            background: transparent;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--lang-text);
            transition: 0.2s;
        }

        .lang-toggle button.active {
            background: var(--lang-active);
            color: var(--lang-active-text);
        }

        .lang-toggle button:hover:not(.active) {
            background: var(--border-color);
        }

        /* ============================================================
           ICON GRID
           ============================================================ */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem 1.8rem;
            margin-top: 0.5rem;
        }

        /* ============================================================
           ICON CARD
           ============================================================ */
        .icon-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 1.4rem 0.8rem 1.2rem;
            box-shadow: var(--shadow);
            transition: transform 0.15s ease, box-shadow 0.2s, background 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        .icon-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: var(--border-color);
        }

        .icon-card .image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--image-bg);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.9rem;
            border: 1px solid var(--placeholder-border);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .icon-card .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: 0.2s;
        }

        .icon-card .image-wrapper img:hover {
            transform: scale(1.01);
        }

        .icon-card .image-wrapper .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--placeholder-bg);
            color: var(--text-muted);
            font-size: 0.7rem;
            text-align: center;
            padding: 0.5rem;
            word-break: break-all;
        }

        .icon-number {
            font-size: 0.7rem;
            color: var(--icon-number);
            margin-bottom: 0.3rem;
            transition: color 0.3s ease;
        }

        /* ============================================================
           SIZE OPTIONS
           ============================================================ */
        .size-options {
            display: flex;
            gap: 0.5rem;
            margin: 0.4rem 0 0.6rem;
            width: 100%;
            justify-content: center;
        }

        .size-btn {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            border: 2px solid var(--size-btn-border);
            background: var(--size-btn-bg);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--size-btn-text);
            transition: 0.2s, background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
            flex: 1;
            max-width: 90px;
        }

        .size-btn:hover {
            border-color: var(--text-muted);
            background: var(--bg-hover);
        }

        .size-btn.active {
            border-color: var(--size-btn-active-bg);
            background: var(--size-btn-active-bg);
            color: var(--size-btn-active-text);
        }

        .size-btn .price-tag {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 0.1rem;
        }

        /* ============================================================
           PRICE
           ============================================================ */
        .price {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--price-color);
            margin: 0.4rem 0 0.6rem;
            transition: color 0.3s ease;
        }

        .price small {
            font-weight: 400;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-left: 4px;
        }

        /* ============================================================
           ADD BUTTON
           ============================================================ */
        .btn-add {
            background: var(--btn-primary);
            border: none;
            color: var(--btn-primary-text);
            font-weight: 500;
            padding: 0.6rem 0;
            width: 100%;
            border-radius: 60px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s, background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
            cursor: pointer;
            margin-top: 0.2rem;
            border: 1px solid var(--btn-primary);
        }

        .btn-add i {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .btn-add:hover {
            background: var(--btn-primary-hover);
            border-color: var(--btn-primary-hover);
        }

        .btn-add:active {
            transform: scale(0.95);
        }

        .btn-add.in-cart {
            background: var(--btn-in-cart);
            border-color: var(--btn-in-cart-border);
        }

        .btn-add.in-cart i {
            color: white;
        }

        .btn-add:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .shop-footer {
            margin-top: 4rem;
            padding-top: 1.8rem;
            border-top: 1px solid var(--footer-border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: border-color 0.3s ease, color 0.3s ease;
        }

        .shop-footer i {
            margin: 0 4px;
            color: var(--text-muted);
        }

        .hidden {
            display: none !important;
        }

        /* ============================================================
           FLOATING CART
           ============================================================ */
        .floating-cart {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--cart-bg);
            color: var(--cart-text);
            padding: 1rem 1.5rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            transition: 0.2s, background 0.3s ease, color 0.3s ease;
            cursor: pointer;
            z-index: 100;
            border: none;
        }

        .floating-cart:hover {
            transform: scale(1.05);
            background: var(--btn-primary-hover);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .floating-cart i {
            font-size: 1.3rem;
            color: var(--text-muted);
        }

        .floating-cart .cart-count {
            background: var(--cart-count-bg);
            color: var(--cart-count-text);
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .floating-cart .cart-total {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-left: 2px;
        }

        /* ============================================================
           CART MODAL
           ============================================================ */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-modal-content {
            background: var(--modal-bg);
            border-radius: 28px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
            transition: background 0.3s ease;
        }

        .cart-modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            background: none;
            border: none;
            transition: color 0.3s ease;
        }

        .cart-modal-close:hover {
            color: var(--text-primary);
        }

        .cart-modal h2 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: var(--text-primary);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border-light);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .cart-item-size {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .cart-item-price {
            font-weight: 600;
            margin-left: 1rem;
            color: var(--text-primary);
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: #c0392b;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.2rem 0.5rem;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            font-size: 1.2rem;
            font-weight: 600;
            border-top: 2px solid var(--border-color);
            margin-top: 0.5rem;
            color: var(--text-primary);
        }

        .cart-actions {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .contact-options {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .btn-contact {
            flex: 1;
            min-width: 100px;
            padding: 0.8rem 1rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn-contact:hover {
            transform: scale(1.02);
        }

        .btn-sms {
            background: #34b7f1;
            color: white;
        }

        .btn-sms:hover {
            background: #2a9fd6;
        }

        .btn-whatsapp {
            background: #25d366;
            color: white;
        }

        .btn-whatsapp:hover {
            background: #1da851;
        }

        .btn-telegram {
            background: #0088cc;
            color: white;
        }

        .btn-telegram:hover {
            background: #0077b3;
        }

        .btn-clear-cart {
            background: var(--clear-btn-bg);
            color: var(--clear-btn-text);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .btn-clear-cart:hover {
            background: var(--clear-btn-hover);
        }

        .empty-cart {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem 0;
        }

        .empty-cart i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .contact-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
            text-align: center;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 600px) {
            body {
                padding: 1.2rem 0.8rem;
                padding-bottom: 6rem;
            }
            .shop-header h1 {
                font-size: 1.5rem;
            }
            .icon-grid {
                gap: 1.5rem;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .header-controls {
                gap: 0.5rem;
            }
            .lang-toggle button {
                padding: 0.3rem 0.7rem;
                font-size: 0.75rem;
            }
            .size-btn {
                font-size: 0.65rem;
                padding: 0.2rem 0.5rem;
                max-width: 70px;
            }
            .size-btn .price-tag {
                font-size: 0.6rem;
            }
            .cart-modal-content {
                padding: 1.5rem;
                max-height: 90vh;
            }
            .floating-cart {
                bottom: 1rem;
                right: 1rem;
                padding: 0.8rem 1.2rem;
                font-size: 0.85rem;
            }
            .floating-cart i {
                font-size: 1rem;
            }
            .contact-options {
                flex-direction: column;
            }
            .btn-contact {
                min-width: unset;
            }
            .theme-toggle {
                padding: 0.3rem 0.7rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <header class="shop-header">
            <h1><i class="fas fa-pen-fancy"></i> <span id="storeTitle">Zoie Gifts</span></h1>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <span class="theme-icon" id="themeIcon"> </span>
                    <span id="themeLabel">Dark</span>
                </button>
                <div class="lang-toggle">
                    <button id="langAmh" class="active">አማርኛ</button>
                    <button id="langEng">English</button>
                </div>
            </div>
        </header>

        <div class="icon-grid" id="iconGrid"></div>

        <div class="shop-footer">
            <span><i class="far fa-copyright"></i> <span id="footerLeft">Zoie Gifts</span></span>
            <span><i class="fas fa-credit-card"></i> <span id="footerRight">መክፈያ</span></span>
        </div>
    </div>

    <!-- Floating Cart Button -->
    <button class="floating-cart" id="floatingCart">
        <i class="fas fa-shopping-bag"></i>
        <span class="cart-count" id="cartCount">0</span>
        <span class="cart-total" id="cartTotal"></span>
    </button>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-modal-content">
            <button class="cart-modal-close" id="cartModalClose">&times;</button>
            <h2 id="cartModalTitle">🛒 Your Cart</h2>
            <div id="cartItemsList"></div>
            <div class="cart-total">
                <span id="totalLabel">Total</span>
                <span id="cartTotalAmount">0 ብር</span>
            </div>
            <div class="cart-actions">
                <div class="contact-label" id="contactLabel">📱 Choose how to send your order:</div>
                <div class="contact-options">
                    <button class="btn-contact btn-sms" id="smsBtn">
                        <i class="fas fa-sms"></i> SMS
                    </button>
                    <button class="btn-contact btn-whatsapp" id="whatsappBtn">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </button>
                    <button class="btn-contact btn-telegram" id="telegramBtn">
                        <i class="fab fa-telegram-plane"></i> Telegram
                    </button>
                </div>
                <button class="btn-clear-cart" id="clearCartBtn">
                    <i class="fas fa-trash"></i> <span id="clearText">Clear</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============================================================
            // THEME MANAGEMENT
            // ============================================================
            function getPreferredTheme() {
                const saved = localStorage.getItem('zoie_theme');
                if (saved) return saved;
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    return 'dark';
                }
                return 'light';
            }

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('zoie_theme', theme);
                updateThemeUI(theme);
            }

            function toggleTheme() {
                const current = document.documentElement.getAttribute('data-theme') || 'light';
                const next = current === 'light' ? 'dark' : 'light';
                setTheme(next);
            }

            function updateThemeUI(theme) {
                const icon = document.getElementById('themeIcon');
                const label = document.getElementById('themeLabel');
                if (theme === 'dark') {
                    icon.textContent = '';
                    label.textContent = currentLang === 'amh' ? 'Light' : 'Light';
                } else {
                    icon.textContent = '';
                    label.textContent = currentLang === 'amh' ? 'Dark' : 'Dark';
                }
            }

            // ============================================================
            // IMAGE FILENAMES
            // ============================================================
            const imageFilenames = [
                "-5848072967282167192_121.jpg",
                "-5931342307158330333_121.jpg",
                "-5974557035431315110_121.jpg",
                "-5976598046843800617_121.jpg",
                "-6005860303272790639_120.jpg",
                "IMG_20260719_011920_144.jpg",
                "IMG_20260719_011954_524.jpg",
                "IMG_20260719_011958_447.jpg",
                "IMG_20260719_012002_689.jpg",
                "IMG_20260719_012005_479.jpg",
                "IMG_20260719_012015_989.jpg",
                "IMG_20260719_012128_866.jpg",
                "IMG_20260719_012129_197.jpg",
                "IMG_20260719_012129_338.jpg",
                "IMG_20260719_012129_585.jpg",
                "IMG_20260719_012129_607.jpg"
            ];

            // ============================================================
            // CONTACT INFO
            // ============================================================
            const CONTACTS = {
                sms: {
                    number: '0940640089',
                    label: 'SMS'
                },
                whatsapp: {
                    number: '+251940640089',
                    label: 'WhatsApp'
                },
                telegram: {
                    username: 'SIPIET',
                    label: 'Telegram'
                }
            };

            // ============================================================
            // PRICES
            // ============================================================
            const PRICES = {
                A5: 400,
                HALF: 200
            };

            // ============================================================
            // CART MANAGEMENT (localStorage)
            // ============================================================
            let cart = [];

            function loadCart() {
                try {
                    const saved = localStorage.getItem('zoie_cart');
                    if (saved) {
                        cart = JSON.parse(saved);
                    }
                } catch (e) {
                    cart = [];
                }
            }

            function saveCart() {
                localStorage.setItem('zoie_cart', JSON.stringify(cart));
            }

            function addToCart(imageIndex, size, price) {
                const existing = cart.find(item => item.imageIndex === imageIndex && item.size === size);
                if (existing) {
                    existing.quantity += 1;
                } else {
                    cart.push({
                        imageIndex: imageIndex,
                        filename: imageFilenames[imageIndex],
                        size: size,
                        price: price,
                        quantity: 1
                    });
                }
                saveCart();
                updateCartUI();
            }

            function removeFromCart(index) {
                cart.splice(index, 1);
                saveCart();
                updateCartUI();
                renderCartModal();
            }

            function clearCart() {
                cart = [];
                saveCart();
                updateCartUI();
                renderCartModal();
            }

            function getTotalItems() {
                return cart.reduce((sum, item) => sum + item.quantity, 0);
            }

            function getTotalPrice() {
                return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            }

            function isInCart(imageIndex, size) {
                return cart.some(item => item.imageIndex === imageIndex && item.size === size);
            }

            // ============================================================
            // BUILD ORDER MESSAGE
            // ============================================================
            function buildOrderMessage() {
                let message = ' Zoie Gifts Store Order\n';
                let total = 0;

                cart.forEach((item, idx) => {
                    const sizeLabel = item.size === 'A5' ? 'A5' : '½ A5';
                    const subtotal = item.price * item.quantity;
                    total += subtotal;
                    message += `${idx + 1}. Icon #${item.imageIndex + 1} (${sizeLabel}) × ${item.quantity} = ${subtotal} ብር\n`;
                });

                message += `\n────────────────\n`;
                message += `Total: ${total} ብር\n\n`;
                message += `Thank you for your order! 🙏`;
                return message;
            }

            // ============================================================
            // CHECKOUT METHODS
            // ============================================================
            function checkoutSMS() {
                if (cart.length === 0) {
                    alert(currentLang === 'amh' ? 'ጋሪዎ ባዶ ነው!' : 'Your cart is empty!');
                    return;
                }
                const message = buildOrderMessage();
                const encodedMessage = encodeURIComponent(message);
                const smsUrl = `sms:${CONTACTS.sms.number}?body=${encodedMessage}`;
                window.location.href = smsUrl;
                setTimeout(() => { clearCart();
                    cartModal.classList.remove('active'); }, 1000);
            }

            function checkoutWhatsApp() {
                if (cart.length === 0) {
                    alert(currentLang === 'amh' ? 'ጋሪዎ ባዶ ነው!' : 'Your cart is empty!');
                    return;
                }
                const message = buildOrderMessage();
                const encodedMessage = encodeURIComponent(message);
                const waUrl = `https://wa.me/${CONTACTS.whatsapp.number.replace('+', '')}?text=${encodedMessage}`;
                window.open(waUrl, '_blank');
                setTimeout(() => { clearCart();
                    cartModal.classList.remove('active'); }, 1000);
            }

            function checkoutTelegram() {
                if (cart.length === 0) {
                    alert(currentLang === 'amh' ? 'ጋሪዎ ባዶ ነው!' : 'Your cart is empty!');
                    return;
                }
                const message = buildOrderMessage();
                const encodedMessage = encodeURIComponent(message);
                const tgUrl = `https://t.me/${CONTACTS.telegram.username}?text=${encodedMessage}`;
                window.open(tgUrl, '_blank');
                setTimeout(() => { clearCart();
                    cartModal.classList.remove('active'); }, 1000);
            }

            // ============================================================
            // UI ELEMENTS
            // ============================================================
            const grid = document.getElementById('iconGrid');
            const cartSpan = document.getElementById('cartCount');
            const cartTotalSpan = document.getElementById('cartTotal');
            const cartModal = document.getElementById('cartModal');
            const cartItemsList = document.getElementById('cartItemsList');
            const cartTotalAmount = document.getElementById('cartTotalAmount');
            const floatingCart = document.getElementById('floatingCart');

            let currentLang = 'amh';
            let allCards = [];

            // ============================================================
            // BUILD THE GRID
            // ============================================================
            const baseUrl = 'https://raw.githubusercontent.com/bontushambel/Zoie/main/';

            imageFilenames.forEach((filename, index) => {
                const card = document.createElement('div');
                card.className = 'icon-card';
                card.dataset.index = index;

                const wrapper = document.createElement('div');
                wrapper.className = 'image-wrapper';

                const img = document.createElement('img');
                img.src = baseUrl + filename;
                img.alt = 'Icon';
                img.loading = 'lazy';

                img.onerror = function() {
                    this.style.display = 'none';
                    const placeholder = document.createElement('div');
                    placeholder.className = 'placeholder';
                    placeholder.textContent = '📷 ' + filename.substring(0, 18) + '…';
                    this.parentNode.appendChild(placeholder);
                };

                wrapper.appendChild(img);
                card.appendChild(wrapper);

                const numberEl = document.createElement('div');
                numberEl.className = 'icon-number';
                numberEl.textContent = `#${index + 1}`;
                card.appendChild(numberEl);

                const sizeContainer = document.createElement('div');
                sizeContainer.className = 'size-options';

                const a5Btn = document.createElement('button');
                a5Btn.className = 'size-btn active';
                a5Btn.dataset.size = 'A5';
                a5Btn.innerHTML = `A5 <span class="price-tag">${PRICES.A5} ብር</span>`;
                sizeContainer.appendChild(a5Btn);

                const halfBtn = document.createElement('button');
                halfBtn.className = 'size-btn';
                halfBtn.dataset.size = 'HALF';
                halfBtn.innerHTML = `½ A5 <span class="price-tag">${PRICES.HALF} ብር</span>`;
                sizeContainer.appendChild(halfBtn);

                card.appendChild(sizeContainer);

                const priceEl = document.createElement('div');
                priceEl.className = 'price';
                priceEl.innerHTML = `${PRICES.A5} <small>ብር</small>`;
                card.appendChild(priceEl);

                const btn = document.createElement('button');
                btn.className = 'btn-add';
                btn.innerHTML = `<i class="fas fa-plus-circle"></i> <span class="btn-text">ጨምር</span>`;
                btn.dataset.size = 'A5';
                btn.dataset.price = PRICES.A5;

                let selectedSize = 'A5';

                function selectSize(size) {
                    selectedSize = size;
                    const price = size === 'A5' ? PRICES.A5 : PRICES.HALF;
                    priceEl.innerHTML = `${price} <small>ብር</small>`;
                    btn.dataset.size = size;
                    btn.dataset.price = price;

                    a5Btn.classList.toggle('active', size === 'A5');
                    halfBtn.classList.toggle('active', size === 'HALF');

                    updateButtonState(index, size);
                }

                function updateButtonState(imgIndex, size) {
                    const inCart = isInCart(imgIndex, size);
                    if (inCart) {
                        btn.classList.add('in-cart');
                        btn.innerHTML =
                            `<i class="fas fa-check"></i> <span class="btn-text">${currentLang === 'amh' ? 'ተጨምሯል' : 'in cart'}</span>`;
                    } else {
                        btn.classList.remove('in-cart');
                        btn.innerHTML =
                            `<i class="fas fa-plus-circle"></i> <span class="btn-text">${currentLang === 'amh' ? 'ጨምር' : 'Add'}</span>`;
                    }
                }

                a5Btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    selectSize('A5');
                });

                halfBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    selectSize('HALF');
                });

                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const price = parseInt(this.dataset.price);
                    const size = this.dataset.size;

                    if (isInCart(index, size)) {
                        const itemIndex = cart.findIndex(item => item.imageIndex === index && item.size === size);
                        if (itemIndex !== -1) {
                            cart.splice(itemIndex, 1);
                            saveCart();
                            updateCartUI();
                            updateButtonState(index, size);
                        }
                        return;
                    }

                    addToCart(index, size, price);
                    updateButtonState(index, size);
                    updateCartUI();

                    const orig = this.innerHTML;
                    this.innerHTML =
                        `<i class="fas fa-check"></i> <span class="btn-text">${currentLang === 'amh' ? 'ተጨመረ' : 'added'}</span>`;
                    this.style.background = '#3a6b4b';
                    this.style.borderColor = '#2b5a3a';
                    setTimeout(() => {
                        this.innerHTML = orig;
                        this.style.background = '#1e1b17';
                        this.style.borderColor = '#2d2a24';
                    }, 800);
                });

                card.appendChild(btn);
                grid.appendChild(card);

                allCards.push({
                    card: card,
                    btn: btn,
                    a5Btn: a5Btn,
                    halfBtn: halfBtn,
                    priceEl: priceEl,
                    selectedSize: 'A5',
                    index: index
                });

                updateButtonState(index, 'A5');
            });

            // ============================================================
            // UPDATE CART UI
            // ============================================================
            function updateCartUI() {
                const totalItems = getTotalItems();
                const totalPrice = getTotalPrice();

                if (cartSpan) cartSpan.textContent = totalItems;
                if (cartTotalSpan) {
                    cartTotalSpan.textContent = totalItems > 0 ? `${totalPrice} ብር` : '';
                }

                allCards.forEach(cardData => {
                    const size = cardData.selectedSize || 'A5';
                    const inCart = isInCart(cardData.index, size);
                    const btn = cardData.btn;
                    if (inCart) {
                        btn.classList.add('in-cart');
                        btn.innerHTML =
                            `<i class="fas fa-check"></i> <span class="btn-text">${currentLang === 'amh' ? 'ተጨምሯል' : 'in cart'}</span>`;
                    } else {
                        btn.classList.remove('in-cart');
                        btn.innerHTML =
                            `<i class="fas fa-plus-circle"></i> <span class="btn-text">${currentLang === 'amh' ? 'ጨምር' : 'Add'}</span>`;
                    }
                });
            }

            // ============================================================
            // CART MODAL
            // ============================================================
            function renderCartModal() {
                if (cart.length === 0) {
                    cartItemsList.innerHTML = `
                        <div class="empty-cart">
                            <i class="fas fa-shopping-bag"></i>
                            <p>${currentLang === 'amh' ? 'ጋሪዎ ባዶ ነው' : 'Your cart is empty'}</p>
                        </div>
                    `;
                    cartTotalAmount.textContent = '0 ብር';
                    return;
                }

                let html = '';
                cart.forEach((item, idx) => {
                    const sizeLabel = item.size === 'A5' ? 'A5' : '½ A5';
                    html += `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <div class="cart-item-name">Icon #${item.imageIndex + 1}</div>
                                <div class="cart-item-size">${sizeLabel} × ${item.quantity}</div>
                            </div>
                            <div class="cart-item-price">${item.price * item.quantity} ብር</div>
                            <button class="cart-item-remove" data-index="${idx}">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    `;
                });

                cartItemsList.innerHTML = html;

                document.querySelectorAll('.cart-item-remove').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        removeFromCart(idx);
                        allCards.forEach(cardData => {
                            const size = cardData.selectedSize || 'A5';
                            updateButtonStateForCard(cardData, size);
                        });
                    });
                });

                const total = getTotalPrice();
                cartTotalAmount.textContent = `${total} ብር`;
            }

            function updateButtonStateForCard(cardData, size) {
                const inCart = isInCart(cardData.index, size);
                const btn = cardData.btn;
                if (inCart) {
                    btn.classList.add('in-cart');
                    btn.innerHTML =
                        `<i class="fas fa-check"></i> <span class="btn-text">${currentLang === 'amh' ? 'ተጨምሯል' : 'in cart'}</span>`;
                } else {
                    btn.classList.remove('in-cart');
                    btn.innerHTML =
                        `<i class="fas fa-plus-circle"></i> <span class="btn-text">${currentLang === 'amh' ? 'ጨምር' : 'Add'}</span>`;
                }
            }

            // ============================================================
            // LANGUAGE TOGGLE
            // ============================================================
            const langAmhBtn = document.getElementById('langAmh');
            const langEngBtn = document.getElementById('langEng');
            const storeTitle = document.getElementById('storeTitle');
            const footerLeft = document.getElementById('footerLeft');
            const footerRight = document.getElementById('footerRight');
            const cartModalTitle = document.getElementById('cartModalTitle');
            const totalLabel = document.getElementById('totalLabel');
            const clearText = document.getElementById('clearText');
            const contactLabel = document.getElementById('contactLabel');

            const translations = {
                amh: {
                    title: 'Zoie Gifts',
                    footerLeft: 'Zoie Gifts ',
                    footerRight: 'መክፈያ',
                    cartModalTitle: '🛒 ጋሪዎ',
                    totalLabel: 'ጠቅላላ',
                    clearText: 'አጽዳ',
                    btnText: 'ጨምር',
                    btnInCart: 'ተጨምሯል',
                    emptyCart: 'ጋሪዎ ባዶ ነው',
                    contactLabel: '📱 ትዕዛዝዎን እንዴት መላክ ይፈልጋሉ?',
                    themeLight: 'Light',
                    themeDark: 'Dark'
                },
                eng: {
                    title: 'Zoie Gifts ',
                    footerLeft: 'Zoie Gifts ',
                    footerRight: 'Checkout',
                    cartModalTitle: '🛒 Your Cart',
                    totalLabel: 'Total',
                    clearText: 'Clear',
                    btnText: 'Add',
                    btnInCart: 'in cart',
                    emptyCart: 'Your cart is empty',
                    contactLabel: '📱 Choose how to send your order:',
                    themeLight: 'Light',
                    themeDark: 'Dark'
                }
            };

            function setLanguage(lang) {
                currentLang = lang;
                const t = translations[lang];

                storeTitle.textContent = t.title;
                footerLeft.textContent = t.footerLeft;
                footerRight.textContent = t.footerRight;
                cartModalTitle.textContent = t.cartModalTitle;
                totalLabel.textContent = t.totalLabel;
                clearText.textContent = t.clearText;
                contactLabel.textContent = t.contactLabel;

                // Update theme label
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
                const themeLabel = document.getElementById('themeLabel');
                themeLabel.textContent = currentTheme === 'dark' ? t.themeLight : t.themeDark;

                allCards.forEach(item => {
                    const size = item.selectedSize || 'A5';
                    const inCart = isInCart(item.index, size);
                    const btn = item.btn;
                    if (inCart) {
                        btn.innerHTML =
                            `<i class="fas fa-check"></i> <span class="btn-text">${t.btnInCart}</span>`;
                    } else {
                        btn.innerHTML =
                            `<i class="fas fa-plus-circle"></i> <span class="btn-text">${t.btnText}</span>`;
                    }
                });

                updateCartUI();
                renderCartModal();

                langAmhBtn.classList.toggle('active', lang === 'amh');
                langEngBtn.classList.toggle('active', lang === 'eng');
            }

            langAmhBtn.addEventListener('click', () => setLanguage('amh'));
            langEngBtn.addEventListener('click', () => setLanguage('eng'));

            // ============================================================
            // THEME EVENTS
            // ============================================================
            document.getElementById('themeToggle').addEventListener('click', function() {
                toggleTheme();
            });

            // ============================================================
            // CART MODAL EVENTS
            // ============================================================
            floatingCart.addEventListener('click', function() {
                renderCartModal();
                cartModal.classList.add('active');
            });

            document.getElementById('cartModalClose').addEventListener('click', function() {
                cartModal.classList.remove('active');
            });

            cartModal.addEventListener('click', function(e) {
                if (e.target === this) {
                    cartModal.classList.remove('active');
                }
            });

            document.getElementById('clearCartBtn').addEventListener('click', function() {
                if (cart.length === 0) return;
                if (confirm(currentLang === 'amh' ? 'ሁሉንም ከጋሪ ማስወገድ ይፈልጋሉ?' : 'Clear all items from cart?')) {
                    clearCart();
                    renderCartModal();
                }
            });

            // Contact buttons
            document.getElementById('smsBtn').addEventListener('click', checkoutSMS);
            document.getElementById('whatsappBtn').addEventListener('click', checkoutWhatsApp);
            document.getElementById('telegramBtn').addEventListener('click', checkoutTelegram);

            // ============================================================
            // KEYBOARD SHORTCUT - ESC to close modal
            // ============================================================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && cartModal.classList.contains('active')) {
                    cartModal.classList.remove('active');
                }
            });

            // ============================================================
            // INITIALIZE
            // ============================================================
            // Load theme
            const savedTheme = getPreferredTheme();
            setTheme(savedTheme);

            // Load cart and set language
            loadCart();
            setLanguage('amh');
            document.getElementById('iconCount').textContent = imageFilenames.length;
            updateCartUI();

            console.log(`✅ Zoie store ready · ${imageFilenames.length} icons loaded`);
            console.log(`📐 Sizes: A5 (${PRICES.A5} ETB) and Half A5 (${PRICES.HALF} ETB)`);
            console.log(`📱 Contact options: SMS (${CONTACTS.sms.number}), WhatsApp (${CONTACTS.whatsapp.number}), Telegram (@${CONTACTS.telegram.username})`);
            console.log(`🌓 Theme: ${savedTheme}`);
            console.log(`💾 Cart saved in localStorage`);
        })();
    </script>
</body>
</html>
